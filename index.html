<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogDetail Data Entry Form</title>
    <style>
        :root { --primary: #4d662b; --bg: #f4f6f1; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 5px 15px 15px 15px; display: flex; flex-direction: column; align-items: center; }
        .container { background: #ffffff; max-width: 400px; width: 100%; padding: 8px 15px 15px 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.30); border-top: 5px solid var(--primary); box-sizing: border-box; }
        h2 { color: var(--primary); margin-top: 0; margin-bottom: 2px; text-align: center; border-bottom: 0px solid var(--primary); padding-bottom: 0px;font-size: 16px;}
        .form-group { margin-bottom: 3px;display: flex; align-items: center; gap: 4px; }
        label { font-weight: 600; color: #333; font-size: 12px; white-space: nowrap; width: 100px;}

        input[type="text"], input[type="number"], select { flex: 1; min-width: 0; padding: 3px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 12px; height: 24px; }

        .row { display: flex; flex-direction: column; gap: 0;}
        .col { flex: 1; min-width: 0; }
        .btn { display: block; width: 100%; padding: 5px; font-size: 11px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; margin-top: 5px; text-align: center; text-transform: uppercase; }
        .btn-submit { background-color: var(--primary); color: white; }
        .btn-export { background-color: #0078d4; color: white; }
        .counter { text-align: center; font-weight: bold; margin: -4px 0px 2px 0; color: #333; background: #d4edda; padding: 4px; border-radius: 4px; font-size: 11px; }
        .preview-box { width: 100%; height: 40px; margin-top: 5px; font-family: monospace; font-size: 10px; padding: 5px; border: 1px solid #ccc; background: #fafafa; box-sizing: border-box; resize: none; }
        @media (max-width: 480px) { .row { flex-direction: column; gap: 0; } }
    </style>
</head>
<body>

<div class="container">
    <h2>🌲 Log Detail-Data Entry</h2>

    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 3px; gap: 10px;">
        <div id="entryCounter" class="counter" style="margin: 0; flex: 1; text-align: center; height: 16px; display: flex; align-items: center; justify-content: center;">Total Records: 0</div>

        <div id="gradeDisplayBox" style="margin: 0; flex: 1; text-align: center; font-weight: bold; color: #ffffff; background: #2b4d66; border-radius: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; height: 26px; display: flex; align-items: center; justify-content: center; transition: background 0.3s ease;">
            Grade: <span id="logGradeValue" style="color: #ffffff; font-size: 11px; font-weight: 900; background: rgba(0,0,0,0.2); padding: 0px 6px; border-radius: 3px; margin-left: 4px;">N</span>
        </div>
    </div>
    <form id="forestForm" onsubmit="return false;">
        <div class="row">
            <div class="form-group col"><label>Forest</label><input type="text" id="forest" placeholder="e.g., CF/BAD/RA/01/01"></div>
            <div class="form-group col"><label>Plot</label><input type="text" id="plot" placeholder="e.g., C1S1"></div>
        </div>
        <div class="row">
            <div class="form-group col"><label>MDate</label><input type="text" id="mdate" placeholder="e.g., 2081/06/20q"></div>
            <div class="form-group col"><label>Fiscal Year</label><input type="text" id="fyear" placeholder="e.g., 2081/082"></div>
        </div>
        <div class="row">
            <div class="form-group col"><label>LogSn</label><input type="number" id="logsn" placeholder="e.g., 1"></div>
            <div class="form-group col"><label>Chhapan</label><input type="number" id="chhapan" placeholder="e.g., 1"></div>
            <div class="form-group col"><label>TN</label><input type="number" id="tn" placeholder="e.g., 450"></div>
        </div>
        <div class="row">
            <div class="form-group col">
                <label>Species</label>
                <select id="spp">
                    <option value="">Loading list...</option>
                </select>
            </div>
            <div class="form-group col"><label>Logn</label><input type="number" id="logn" placeholder="e.g., 1"></div>
        </div>
        <div class="row">
            <div class="form-group col"><label>SizeL</label><input type="number" id="sizel" step="any" placeholder="e.g., 10"></div>
            <div class="form-group col"><label>SizeG</label><input type="number" id="sizeg" step="any" placeholder="e.g., 54"></div>
        </div>
        <div class="row">
            <div class="form-group col"><label>Hl</label><input type="number" id="hl" step="any" placeholder="e.g., 10"></div>
            <div class="form-group col"><label>Hd1</label><input type="number" id="hd1" step="any" placeholder="e.g., 6"></div>
            <div class="form-group col"><label>Hd2</label><input type="number" id="hd2" step="any" placeholder="e.g., 4"></div>
        </div>
        <div class="row">
            <div class="form-group col"><label>Pile</label><input type="number" id="pile" placeholder="e.g., 1"></div>
            <div class="form-group col"><label>Type</label><input type="text" id="type" placeholder="e.g., RF"></div>
            <div class="form-group col"><label>Share</label><input type="text" id="share" placeholder="e.g., LUI"></div>
        </div>
        <div class="row">
            <div class="form-group col"><label>EG</label><input type="text" id="eg" placeholder="e.g., 1"></div>
            <div class="form-group col"><label>Re</label><input type="text" id="re" placeholder="e.g., Bulges"></div>
        </div>

<div class="form-group col" style="background:#f9fbf7; border:1px dashed var(--primary); padding:4px; border-radius:4px; display: flex; justify-content: flex-start; gap: 4px;">
    <label for="photoFile" style="width: auto; min-width: 70px;">📸 Photo</label>
    <input type="file" id="photoFile" accept="image/*" capture="environment">
</div>


 <button type="button" class="btn btn-submit" id="saveBtn">💾 Save Record</button>
    </form>
    <label style="margin-top:5px; font-weight:bold; display:block;">Current Batch Data Preview:</label>
    <textarea id="dataPreview" class="preview-box" readonly placeholder="No data saved in this batch yet."></textarea>
    <button type="button" class="btn btn-export" id="exportBtn">📤 Export all-CSV</button>
</div>
<script>
    // 1. Initial configuration and safe startup initialization
    const headers = ["Forest", "Plot", "MDate", "FYear", "LogSn", "Chhapan", "TN", "Spp", "Logn", "SizeL", "SizeG", "Hl", "Hd1", "Hd2", "Pile", "Type", "Share", "EG", "Re", "PhotoLink", "Tstamp"];
    let runtimeRecords = [];

    // Safely parse existing items from local browser memory on page boot
    try {
        const storedData = localStorage.getItem('forestry_batch_data');
        if (storedData) {
            runtimeRecords = JSON.parse(storedData) || [];
        }
    } catch (e) {
        console.error("Could not read local storage records:", e);
        runtimeRecords = [];
    }

    // Function to calculate and apply the next increment values
    function applyAutoIncrements() {
        let nextIndex = runtimeRecords.length + 1;

        let logsnField = document.getElementById('logsn');
        let lognField = document.getElementById('logn');

        if (logsnField) logsnField.value = nextIndex;
        if (lognField) lognField.value = nextIndex;
    }

    // Fetch species.txt and auto-retain last choice
    function loadSpeciesAndRetainChoice() {
        fetch('species.txt')
            .then(response => {
                if (!response.ok) throw new Error('File not found');
                return response.text();
            })
            .then(textData => {
                const dropdown = document.getElementById('spp');
                dropdown.innerHTML = '<option value="">-- Select Species --</option>';

                const speciesList = textData.split(/\r?\n/).filter(line => line.trim() !== '');
                speciesList.forEach(speciesName => {
                    const option = document.createElement('option');
                    option.value = speciesName.trim();
                    option.textContent = speciesName.trim();
                    dropdown.appendChild(option);
                });

                if (runtimeRecords && runtimeRecords.length > 0) {
                    const lastRecord = runtimeRecords[runtimeRecords.length - 1];
                    if (lastRecord.Spp) {
                        dropdown.value = lastRecord.Spp;
                    }
                }
                updateGradeUI();
            })
            .catch(error => {
                console.error("Error reading species.txt:", error);
                const dropdown = document.getElementById('spp');
                dropdown.innerHTML = '<option value="">⚠️ Error loading species list</option>';
            });
    }

    // Offline Mathematical Calculation Grading Engine
    function calculateLogGrade() {
        const eg = document.getElementById('eg') ? document.getElementById('eg').value.trim() : "";
        const spp = document.getElementById('spp') ? document.getElementById('spp').value.trim() : "";
        const k3 = parseFloat(document.getElementById('sizeg').value) || 0;
        const j3 = parseFloat(document.getElementById('sizel').value) || 0;
        const hl = parseFloat(document.getElementById('hl').value) || 0;
        const hd1 = parseFloat(document.getElementById('hd1').value) || 0;
        const hd2 = parseFloat(document.getElementById('hd2').value) || 0;

        if (eg === "1") return "A";
        if (eg === "2") return "B";
        if (eg === "3") return "C";
        if (eg === "4") return "D";
        if (k3 === 0 || j3 === 0) return "N";

        const PI = Math.PI;
        let hollowVol = 0;

        if (hd2 > 0) {
            hollowVol = (((Math.pow(((hd1 + hd2) / 2), 2) * PI) / 576) * hl);
        } else {
            hollowVol = (((Math.pow(hd1, 2) * PI) / 576) * hl);
        }

        const totalVol = ((Math.pow(k3, 2) / (576 * PI)) * j3);
        const w3 = totalVol > 0 ? (hollowVol / totalVol) * 100 : 0;

        if (spp === "Sal") {
            if (k3 >= 60 && j3 >= 6 && w3 <= 5) return "A";
            if ((k3 >= 48 && k3 < 60 && j3 >= 4 && w3 <= 5) || (k3 >= 60 && j3 >= 6 && w3 > 5 && w3 <= 25) || (k3 >= 60 && j3 >= 4 && j3 < 6 && w3 <= 5)) return "B";
            if ((k3 >= 30 && k3 < 48 && j3 >= 3) || (k3 >= 48 && j3 < 4) || (k3 >= 60 && j3 >= 6 && w3 > 25) || (k3 >= 60 && j3 >= 4 && j3 < 6 && w3 > 5) || (k3 >= 48 && k3 < 60 && j3 >= 4 && w3 > 5)) return "C";
            if (k3 < 30 || j3 < 3) return "D";
        }
        if (spp === "Tooni" || spp === "Siris" || spp === "Utis") {
            if (k3 >= 60 && w3 <= 5) return "A";
        }
        if (spp === "Utis" || spp === "Tooni" || spp === "Siris" || spp === "Gamhari") {
            if ((k3 >= 60 && w3 > 5) || (k3 < 60)) return "B";
        }
        if (spp === "Chanp" || spp === "Jamun" || spp === "Asna" || spp === "Karma") {
            if (k3 >= 60 && j3 >= 7 && w3 <= 5) return "A";
            if ((k3 >= 48 && k3 < 60 && j3 >= 5 && w3 <= 5) || (k3 >= 60 && j3 >= 7 && w3 > 5 && w3 <= 25) || (k3 >= 60 && j3 >= 5 && j3 < 7 && w3 <= 5)) return "B";
            if (k3 < 48 || (k3 >= 48 && k3 < 60 && j3 >= 5 && w3 > 5) || (k3 >= 60 && j3 >= 5 && j3 < 7 && w3 > 5) || (k3 >= 60 && j3 >= 7 && w3 > 25) || (j3 < 5)) return "C";
        }
        if (spp === "nSissoo") {
            if (k3 > 48 && j3 > 4 && w3 <= 5) return "A";
            if ((k3 >= 36 && k3 <= 48 && j3 >= 4 && w3 <= 5) || (k3 > 48 && j3 > 4 && w3 > 5 && w3 <= 25)) return "B";
            if ((k3 >= 30 && k3 < 36 && j3 > 3) || (k3 > 48 && j3 > 4 && w3 > 25) || (k3 >= 36 && k3 <= 48 && j3 <= 4)) return "C";
            if (k3 < 30 || j3 <= 3) return "D";
        }
        if (spp === "Sissoo" || spp === "Teak") {
            if (k3 >= 48 && w3 <= 5) return "A";
            if ((k3 >= 48 && w3 > 5) || (k3 < 48)) return "B";
        }
        if (spp === "Salla") {
            if (k3 >= 60 && j3 >= 7 && w3 <= 5) return "A";
            if ((k3 >= 60 && w3 > 5) || (k3 < 60) || (j3 < 7)) return "B";
        }
        return "N";
    }

    function updateGradeUI() {
        const finalGrade = calculateLogGrade();
        document.getElementById('logGradeValue').innerText = finalGrade;
        const displayBox = document.getElementById('gradeDisplayBox');
        if (finalGrade === "A") displayBox.style.backgroundColor = "#2e7d32";
        else if (finalGrade === "B") displayBox.style.backgroundColor = "#1565c0";
        else if (finalGrade === "C") displayBox.style.backgroundColor = "#ef6c00";
        else if (finalGrade === "D") displayBox.style.backgroundColor = "#c62828";
        else displayBox.style.backgroundColor = "#2b4d66";
    }

    // Helper: build the standard photo filename for a record (forest-LogSn-Timestamp.ext)
    function buildPhotoFilename(file) {
        let originalName = file.name;
        let dotIndex = originalName.lastIndexOf('.');
        let ext = dotIndex >= 0 ? originalName.substring(dotIndex).toLowerCase() : "";
        if (!ext || ext.length > 5) ext = ".jpg";

        let forestRaw = document.getElementById('forest') ? document.getElementById('forest').value.trim().toLowerCase() : 'forest';
        let forestClean = forestRaw.replace(/[^a-z0-9]/g, '');
        if (!forestClean) forestClean = 'forest';

        let logsnValue = document.getElementById('logsn') ? document.getElementById('logsn').value : '1';

        let now = new Date();
        let mo = String(now.getMonth() + 1).padStart(2, '0');
        let dy = String(now.getDate()).padStart(2, '0');
        let hr = String(now.getHours()).padStart(2, '0');
        let mn = String(now.getMinutes()).padStart(2, '0');
        let sc = String(now.getSeconds()).padStart(2, '0');
        let compactTime = mo + dy + hr + mn + sc;

        return forestClean + "-" + logsnValue + "-" + compactTime + ext;
    }

    // Helper: trigger an actual download of the photo file to the device, using the standard filename
    function savePhotoToDevice(file, filename) {
        try {
            let objectUrl = URL.createObjectURL(file);
            let link = document.createElement("a");
            link.href = objectUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            // Revoke shortly after to free memory, once the browser has started the download
            setTimeout(() => URL.revokeObjectURL(objectUrl), 2000);
        } catch (e) {
            console.error("Could not save photo to device:", e);
        }
    }

    // CSV field escaping helper (handles embedded quotes/commas/newlines)
    function csvEscape(value) {
        let str = (value === undefined || value === null) ? '' : String(value);
        return '"' + str.replace(/"/g, '""') + '"';
    }

    // Window Onload: populate species list, refresh preview/counter, set auto-increment values
    window.onload = function() {
        loadSpeciesAndRetainChoice();
        if (runtimeRecords && runtimeRecords.length > 0) {
            document.getElementById('entryCounter').innerHTML = "Total Records: " + runtimeRecords.length;
            let displayLines = [];
            for (let i = 0; i < runtimeRecords.length; i++) {
                displayLines.push("Forest: " + runtimeRecords[i].Forest + " | Log: " + runtimeRecords[i].Logn);
            }
            document.getElementById('dataPreview').value = displayLines.join("\n");
        }
        applyAutoIncrements();

        const gradingInputs = ['eg', 'spp', 'sizeg', 'sizel', 'hl', 'hd1', 'hd2'];
        gradingInputs.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', updateGradeUI);
                el.addEventListener('change', updateGradeUI);
            }
        });
    };

    // 3. Save Record Button Functionality (with custom validation)
    document.getElementById('saveBtn').onclick = function() {
        const requiredFields = [
            { id: 'forest', name: 'Forest' },
            { id: 'plot', name: 'Plot' },
            { id: 'mdate', name: 'MDate' },
            { id: 'fyear', name: 'Fiscal Year' },
            { id: 'logsn', name: 'LogSn' },
            { id: 'chhapan', name: 'Chhapan' },
            { id: 'tn', name: 'TN' },
            { id: 'spp', name: 'Species' },
            { id: 'logn', name: 'Logn' },
            { id: 'sizel', name: 'SizeL' },
            { id: 'sizeg', name: 'SizeG' },
            { id: 'hl', name: 'Hl' },
            { id: 'hd1', name: 'Hd1' },
            { id: 'hd2', name: 'Hd2' },
            { id: 'type', name: 'Type' }
        ];

        for (let i = 0; i < requiredFields.length; i++) {
            let field = document.getElementById(requiredFields[i].id);
            if (!field || !field.value.toString().trim()) {
                alert("⚠️ Please enter the " + requiredFields[i].name + " field!");
                if (field) field.focus();
                return;
            }
        }

        // Handle photo: compute filename once, save actual file to device, reuse the name in the record
        let photoFilename = "";
        let fileInput = document.getElementById('photoFile');
        if (fileInput && fileInput.files && fileInput.files.length > 0) {
            let file = fileInput.files[0];
            photoFilename = buildPhotoFilename(file);
            savePhotoToDevice(file, photoFilename);
        }

        // --- ACTUAL SAVE LOGIC ---
        let newRecord = {};
        headers.forEach(h => {
            let elId = h.toLowerCase();

            if (h === 'PhotoLink') {
                newRecord[h] = photoFilename;
            } else if (elId === 'tstamp') {
                newRecord[h] = new Date().toLocaleString();
            } else {
                let element = document.getElementById(elId);
                newRecord[h] = element ? element.value.trim() : "";
            }
        });

        runtimeRecords.push(newRecord);

        try {
            localStorage.setItem('forestry_batch_data', JSON.stringify(runtimeRecords));
        } catch (e) {
            console.error("Local storage update error", e);
        }

        document.getElementById('entryCounter').innerHTML = "Total Records: " + runtimeRecords.length;

        let displayLines = [];
        for (let i = 0; i < runtimeRecords.length; i++) {
            displayLines.push("Forest: " + runtimeRecords[i].Forest + " | Log: " + runtimeRecords[i].Logn);
        }
        document.getElementById('dataPreview').value = displayLines.join("\n");

        // Clear ONLY log-specific changing values (Size dimensions, EG, Remarks, Photo)
        const clearTargets = ['sizel', 'sizeg', 'hl', 'hd1', 'hd2', 'eg', 're', 'photoFile'];
        clearTargets.forEach(id => {
            let inputEl = document.getElementById(id);
            if (inputEl) inputEl.value = "";
        });

        applyAutoIncrements();

        let nextFocus = document.getElementById('sizel');
        if (nextFocus) nextFocus.focus();

        updateGradeUI();
    };

    // 4. Export CSV button mapping framework with dynamic LogD_DateTime naming
    document.getElementById('exportBtn').onclick = function() {
        if (runtimeRecords.length === 0) {
            alert("⚠️ No records found to export!");
            return;
        }

        let clearMemory = confirm("📥 Export Data Batch?\n\nClicking OK will export your CSV file and safely CLEAR all temporary data from your browser memory.");

        if (!clearMemory) {
            return;
        }

        let today = new Date();
        let year = today.getFullYear();
        let month = String(today.getMonth() + 1).padStart(2, '0');
        let day = String(today.getDate()).padStart(2, '0');

        let hours = String(today.getHours()).padStart(2, '0');
        let minutes = String(today.getMinutes()).padStart(2, '0');
        let seconds = String(today.getSeconds()).padStart(2, '0');

        let dynamicFileName = "LogD_" + year + month + day + "_" + hours + minutes + seconds + ".csv";

        // Properly escaped CSV (handles embedded quotes/commas/newlines in any field)
        let csvContent = "data:text/csv;charset=utf-8,"
            + headers.map(csvEscape).join(",") + "\n"
            + runtimeRecords.map(r => headers.map(h => csvEscape(r[h])).join(",")).join("\n");

        let encodedUri = encodeURI(csvContent);
        let link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", dynamicFileName);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        runtimeRecords = [];
        localStorage.removeItem('forestry_batch_data');

        document.getElementById('entryCounter').innerHTML = "Total Records: 0";
        document.getElementById('dataPreview').value = "";

        applyAutoIncrements();

        setTimeout(function() {
            alert("🧹 Batch exported and temporary cache memory successfully cleared!");
        }, 300);
    };

</script>
</body>
</html>
